<!DOCTYPE html>
<html lang="en">
  <!-- ! Head contains basic info of the page -->
  <head>
    <meta charset="UTF-8">                                                
    <meta name="viewport" content="width=device-width, initial-scale=1.0">      
    <title>Lobby</title>                                                      
    <link rel="stylesheet" href="LobbyStyles.css">                             
  </head>

  <body>
    <main class="lobby_grid">
      <!--! Project section -->
      <div class="bubble project_bubble">
          <h2 class="bubble_title">Projects</h2>
          <section id="projects" class="view">
              <div class="bubbleRow">
                  <div class="project_infoBubble">
                      <div class="liveCameraStream">
                          <h1>Cactus Project</h1>
                              <div id="camContainer"></div>
                      </div>
                      <button id="pumpButton" class="button">Water Now</button>
                      <button id="led_button" class="button">Light Up</button>         
                      <p>Last Watered: <span id="elapsedValue">Loading…</span></p>
                      <p>Moisture: <span id="moistureValue">Loading...</span>%</p>
                      <p>Angle: <span id="angleValue">Loading...</span>°</p>
                  </div>
                  <div class="project_infoBubble">                                          
                      <div class="liveCameraStream">                   
                          <h1>Vortex Project</h1>                                    
                              <div id="vortex_cam_container"></div> 
                      </div>
                      <a href="../vortex_page/vortex.html" class="vortex-button">Control Vortex</a>
                      <p>Status: <span id="vortexStatus">Loading...</span></p>               
                  </div>
              </div>
          </section>
      </div>
      <!--! News Section -->
      <div class="bubble news_bubble">
        <h2 class="bubble_title">News</h2>
        <iframe width="1000" height="500" frameborder="0" scrolling="no" src="https://1drv.ms/x/c/f478e1436fb6521c/IQSPNWyYgYfaS5TpIkqmbQakAUnfNWJx6EQKxueYB89Wrnw?em=2&AllowTyping=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"></iframe>
      </div>
      <!--! Investments section -->
      <div class="bubble investments_bubble">
        <h2 class="bubble_title">Investments</h2>
        <div class="graph_grid">
          <div id="tradingview_msft"></div>
          <div id="tradingview_intc"></div>
          <div id="tradingview_vfv"></div>
          <div id="tradingview_amzn"></div>
          <div id="tradingview_nok"></div>
          <div id="tradingview_xly"></div>
          <div id="tradingview_xaw"></div>
          <div id="tradingview_help"></div>
        </div>
      </div>
      <!--! Calendar section -->
      <div class="bubble calendar_bubble">
        <h2 class="bubble_title">Calendar</h2>
      </div>
      <!--! Email section -->
      <div class="bubble email_bubble">
        <h2 class="bubble_title">Emails</h2>
      </div>
      <!--! Entertainment section -->
      <div class="bubble entertainment_bubble">
        <h2 class="bubble_title">Entertainment</h2>
      </div>
    </main>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="trading_view.js"></script>
  <script src="lobby.js"></script>
  </body>
</html>
